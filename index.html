    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .wacana-box {
            background-color: #eef2f7;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-style: italic;
            white-space: pre-line;
        }

        .soal-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .soal-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .pilihan-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opsi-btn {
            background-color: #fff;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .opsi-btn:hover:not([disabled]) {
            background-color: #f0f4f8;
            border-color: var(--primary-color);
        }

        /* State ketika jawaban benar */
        .opsi-btn.benar {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;
        }

        /* State ketika jawaban salah */
        .opsi-btn.salah {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        /* Menonaktifkan tombol setelah dipilih */
        .opsi-btn[disabled] {
            cursor: not-allowed;
        }

        .status-text {
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
        
        .status-text.benar-text {
            color: var(--success-color);
            display: block;
        }
        
        .status-text.salah-text {
            color: var(--error-color);
            display: block;
        }
    </style>
</head>

    // Fungsi untuk memuat soal ke HTML
    function loadQuiz() {
        const quizBox = document.getElementById('quiz-box');
        
        bankSoal.forEach((item, index) => {
            const soalCard = document.createElement('div');
            soalCard.className = 'soal-card';
            
            // Jika ada wacana/teks pendukung
            let wacanaHtml = '';
            if (item.wacana) {
                wacanaHtml = `<div class="wacana-box">${item.wacana}</div>`;
            }

            // Membuat list pilihan jawaban
            let pilihanHtml = '';
            item.pilihan.forEach((opsi, opsiIdx) => {
                pilihanHtml += `
                    <button class="opsi-btn" 
                            onclick="periksaJawaban(this, ${index}, ${opsiIdx})">
                        ${String.fromCharCode(65 + opsiIdx)}. ${opsi}
                    </button>
                `;
            });

            soalCard.innerHTML = `
                ${wacanaHtml}
                <div class="soal-text">${index + 1}. ${item.soal}</div>
                <div class="pilihan-container" id="pilihan-box-${index}">
                    ${pilihanHtml}
                </div>
                <div class="status-text" id="status-${index}"></div>
            `;
            
            quizBox.appendChild(soalCard);
        });
    }

        const infoSoal = bankSoal[soalIdx];
        const containerPilihan = document.getElementById(`pilihan-box-${soalIdx}`);
        const semuaTombol = containerPilihan.getElementsByClassName('opsi-btn');
        const statusText = document.getElementById(`status-${soalIdx}`);
        
        // Kunci semua tombol pada soal ini agar tidak bisa ditekan lagi setelah memilih
        for (let i = 0; i < semuaTombol.length; i++) {
            semuaTombol[i].disabled = true;
            // Tampilkan mana jawaban yang benar aslinya jika user salah memilih
            if (i === infoSoal.jawabanBenar) {
                semuaTombol[i].classList.add('benar');
            }
        }

        // Jalankan pengecekan jawaban seketika
        if (opsiIdx === infoSoal.jawabanBenar) {
            btnTerpilih.classList.add('benar');
            statusText.innerText = "Benar! ✨";
            statusText.className = "status-text benar-text";
        } else {
            btnTerpilih.classList.add('salah');
            statusText.innerText = `Salah! Jawaban yang benar adalah yang berwarna hijau.`;
            statusText.className = "status-text salah-text";
        }
    }

    // Jalankan aplikasi saat halaman pertama kali dibuka
    window.onload = loadQuiz;
</script>
